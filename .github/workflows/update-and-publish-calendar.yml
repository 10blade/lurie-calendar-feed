name: Update and publish calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "37 13 * * 3"
    - cron: "37 14 * * 3"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

concurrency:
  group: lurie-calendar-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.schedule_gate.outputs.should_run }}
    steps:
      - name: Check Chicago schedule gate
        id: schedule_gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(TZ=America/Chicago date +'%H:%M')" = "08:37" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: ruff check .

      - name: Test
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: pytest

      - name: Run scraper
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m lurie_calendar update --days-ahead 180

      - name: Validate generated data
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m lurie_calendar validate data/lurie_events.json

      - name: Commit generated changes
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs logs
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update Lurie calendar feed"
            git push
          fi

      - name: Configure Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/deploy-pages@v4

      - name: Upload parser artifacts on failure
        if: failure() && steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: parser-artifacts
          path: |
            artifacts/
            logs/
          if-no-files-found: ignore

      - name: Create or update failure issue
        if: failure() && steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Lurie calendar scraper failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The Lurie calendar scraper workflow failed.",
              "",
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              "",
              "Check the uploaded parser artifacts and logs for details."
            ].join("\n");
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`
            });
            const existing = issues.items.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              if (existing.state !== "open") {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: "open"
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
